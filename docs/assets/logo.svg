<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Session Finder logo">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2b33"/>
      <stop offset="1" stop-color="#141418"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#9b9ba3"/>
    </linearGradient>
    <clipPath id="lens"><circle cx="430" cy="430" r="178"/></clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#tile)"/>
  <rect x="3" y="3" width="1018" height="1018" rx="229" fill="none" stroke="#ffffff" stroke-opacity="0.09" stroke-width="3"/>

  <!-- session result lines, clipped into the lens -->
  <g clip-path="url(#lens)">
    <rect x="296" y="356" width="232" height="36" rx="18" fill="#f59e0b"/>
    <rect x="296" y="412" width="176" height="36" rx="18" fill="#10b981"/>
    <rect x="296" y="468" width="124" height="36" rx="18" fill="#8b5cf6"/>
  </g>

  <!-- magnifying glass -->
  <line x1="566" y1="566" x2="724" y2="724" stroke="#141418" stroke-width="92" stroke-linecap="round"/>
  <line x1="566" y1="566" x2="724" y2="724" stroke="url(#ring)" stroke-width="60" stroke-linecap="round"/>
  <circle cx="430" cy="430" r="178" fill="none" stroke="url(#ring)" stroke-width="44"/>
</svg>
