name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon; x64 artifacts come from better-sqlite3/onnxruntime prebuilds
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from the "packageManager" field in package.json.

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the bundles once, then package each arch in its OWN electron-builder
      # run. A single multi-arch run rebuilds better-sqlite3 in the shared pnpm
      # store and the x64 pass (last) clobbers it, so the arm64 DMG shipped an
      # x86_64 binary that won't load on Apple Silicon. Separate runs pack each
      # DMG right after its arch's native rebuild. App ships unsigned (MVP).
      - run: pnpm build
      - run: pnpm --filter @asf/main exec electron-builder --mac --arm64 --config electron-builder.yml --publish never
      - run: pnpm --filter @asf/main exec electron-builder --mac --x64 --config electron-builder.yml --publish never

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/main/release/*.dmg
            apps/main/release/*.zip
            apps/main/release/latest-mac.yml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
