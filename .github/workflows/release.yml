name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon; x64 artifacts come from better-sqlite3/onnxruntime prebuilds
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Builds main/preload/renderer, then packs the unsigned DMG + ZIP.
      # The app is intentionally unsigned (no Apple Developer ID) for the MVP.
      - run: pnpm dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/main/release/*.dmg
            apps/main/release/*.zip
            apps/main/release/latest-mac.yml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
