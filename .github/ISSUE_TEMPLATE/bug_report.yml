name: Bug report
description: Report something that isn't working as expected
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., I expected ..., but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug.
      placeholder: |
        1. Open ...
        2. Search for ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Which session source is involved?
      options:
        - Not source-specific
        - Claude Code
        - Codex CLI
        - Cursor
        - Other
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0 (or commit SHA)
    validations:
      required: false
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. 15.3 (Apple Silicon)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output. It will be automatically formatted as code.
      render: shell
    validations:
      required: false
